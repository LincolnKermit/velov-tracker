name: Collect velov data

on:
  schedule:
    # Runs every 30 min at :23 and :53 (UTC). Off-peak minutes avoid the
    # congested :00/:30 slots, which GitHub delays or silently drops under
    # load. Scheduled runs are still best-effort and only fire from the
    # default branch.
    - cron: "23,53 * * * *"
  workflow_dispatch: {} # allow manual runs for testing

# Never let two collection runs overlap and race on the commit.
concurrency:
  group: collect-velov
  cancel-in-progress: false

permissions:
  contents: write # required to commit the data back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect snapshot and push
        env:
          JCD_API_KEY: ${{ secrets.JCD_API_KEY }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # history.csv is append-only and the README section is fully
          # regenerated, so a rebase can never merge them cleanly. Instead we
          # always sync to the tip of origin FIRST, then regenerate on top, so
          # the push is a plain fast-forward. If the remote still moved between
          # our sync and push, we discard, re-sync and regenerate — never rebase.
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            python -m source.collect

            if git diff --quiet -- data/history.csv README.md assets/availability.svg; then
              echo "No changes to commit."
              exit 0
            fi
            git add data/history.csv README.md assets/availability.svg
            git commit -m "data: hourly Vélo'v snapshot [skip ci]"

            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); remote moved, re-syncing."
          done

          echo "Failed to push after 3 attempts."
          exit 1
